<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>So You Want to Be an Architect</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1a1a2e;
    }
    #game-container {
      width: 100%;
      height: 100%;
    }
    canvas {
      /* Smooth scaling keeps text crisp when the 1280x960 canvas is
         FIT-scaled to the viewport. Large (128px) pixel-art tiles still
         look fine under bilinear filtering. */
      image-rendering: auto;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
