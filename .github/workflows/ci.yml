name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect non-docs changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4

      # Detect whether this push/PR touches anything outside docs/**.
      # If only docs/** changed, downstream jobs are skipped — skipped jobs
      # satisfy required status checks, so doc-only PRs can still merge.
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '!docs/**'

  lint-and-unit:
    name: Lint + typecheck + unit tests
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test:unit:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

  e2e:
    name: Playwright E2E (shard ${{ matrix.shard }}/${{ matrix.total }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      # Keep the other shard running if one fails so the full failure picture
      # is available in a single CI run.
      fail-fast: false
      matrix:
        # Two matrix shards × 2 Playwright workers each = 4 effective workers
        # across two runners, roughly halving the wall-clock cost of the
        # Playwright suite while staying under the per-runner 4-vCPU ceiling
        # that triggered timeouts at higher in-runner parallelism.
        shard: [1, 2]
        total: [2]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Build (ensures production bundle typechecks)
        run: npm run build

      - name: Run Playwright tests (shard ${{ matrix.shard }}/${{ matrix.total }})
        run: npx playwright test --shard ${{ matrix.shard }}/${{ matrix.total }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tests-screenshots-shard-${{ matrix.shard }}
          path: tests/screenshots/
          if-no-files-found: ignore
          retention-days: 14
